# RAAKAA Podcast — Decap CMS config
#
# Editing model:
# - One markdown file per episode at src/content/episodes/<slug>.md.
#   Frontmatter holds manual metadata; markdown body holds the transcript.
# - Guests live in a separate JSON file (src/data/guests.json) so they can be
#   referenced by multiple episodes via Decap's `relation` widget.
# - RSS-derived fields (audio URL, publish date as it appears in podcast apps,
#   default cover) come from RSS.com at build time and are NOT editable here.
#
# Custom preview pane: public/admin/index.html registers a live preview that
# renders square 3000×3000 (JPEG for RSS size), YouTube 1920×1080, OG 1200×630
# (PNG) as you type — no save/build required.

backend:
  name: git-gateway
  repo: raakaa-podcast/raakaa-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b430177e-dfca-4421-8163-022c2dfd2791/pkce
  auth_token_endpoint: /sites/b430177e-dfca-4421-8163-022c2dfd2791/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://www.raakaa.fi

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "episodes"
    label: "Jaksot"
    label_singular: "Jakso"
    description: |
      Yksi tiedosto per jakso. Esikatselupaneeli oikealla renderöi reaaliajassa
      neliön, YouTuben (16:9) ja OG-kansikuvat — voit ladata ne suoraan ilman
      julkaisua. Julkaisun jälkeen valmiit kuvat ovat osoitteessa /admin/kuvat
      (neliö 3000×3000 JPEG RSS:n kokorajaa varten; YouTube ja OG PNG.)
    folder: "src/content/episodes"
    create: true
    slug: "{{fields.episodeSlug}}"
    extension: "md"
    format: "frontmatter"
    identifier_field: "episodeSlug"
    summary: "{{title}} — {{episodeSlug}}"
    sortable_fields: ["publishDate", "title", "episodeSlug"]
    view_filters:
      - label: "Julkaistut"
        field: "publishDate"
        pattern: "20"
    fields:
      - label: "Otsikko"
        name: "title"
        widget: "string"
        hint: "Esim. \"RAAKAA #3 - Vieras Etunimi Sukunimi\". Käytetään esikatselun headerissä."
      - label: "Episode slug"
        name: "episodeSlug"
        widget: "string"
        required: true
        pattern: ['^[a-z0-9-]+$', "Käytä vain pieniä kirjaimia, numeroita ja viivoja."]
        hint: "Tiedostonimen ja URL:n pohja. Esim. raakaa-3-etunimi-sukunimi."
      - label: "Episode GUID"
        name: "episodeGuid"
        widget: "string"
        required: false
        hint: "RSS-syötteen <guid>-arvo. Linkittää jakson Decap-metadatan oikeaan RSS-jaksoon."
      - label: "Julkaisupäivä"
        name: "publishDate"
        widget: "datetime"
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "Vain dokumentointia varten — sivu käyttää RSS:n <pubDate>-arvoa."
      - label: "Lyhyt yhteenveto"
        name: "summary"
        widget: "text"
        required: false
        hint: "1-2 lausetta. Näytetään jaksokorteissa ja kansikuvissa."
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Vaihtoehtoinen lyhyt kuvaus arkistoja varten. Voi jättää tyhjäksi."
      - label: "Aiheet / tagit"
        name: "topics"
        widget: "list"
        required: false
        default: []
        field:
          label: "Aihe"
          name: "topic"
          widget: "string"
        hint: "Esim. yhteiskunta, ilmasto, mielenterveys. Käytetään sisäisten linkkien generointiin."
      - label: "Vieraat"
        name: "guests"
        widget: "relation"
        collection: "supporting_data"
        file: "guests"
        value_field: "guests.*.slug"
        search_fields: ["guests.*.name", "guests.*.slug", "guests.*.role"]
        display_fields: ["guests.*.name"]
        multiple: true
        required: false
        min: 0
        hint: "Valitse vieraat olemassa olevasta listasta. Lisää uusia kohdassa Tukidata → Vieraat."
      - label: "YouTube URL"
        name: "youtubeUrl"
        widget: "string"
        required: false
        hint: "Mikä tahansa YouTube-osoite (youtu.be, watch?v=, /embed/)."
      - label: "Mukautettu kansikuva (URL)"
        name: "customCoverImage"
        widget: "string"
        required: false
        hint: "Valinnainen. Korvaa RSS-syötteen kansikuvan, kun haluat eri taustakuvan."
      - label: "PDF-litterointi (URL)"
        name: "pdfUrl"
        widget: "string"
        required: false
        hint: "Jos jakson litterointi on PDF eikä markdown-tekstinä, anna URL — esim. /uploads/litterointi.pdf."
      - label: "Litterointi"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Jakson litterointi markdownina. Tukee otsikoita, listoja, linkkejä ja kursivointia."

  - name: "supporting_data"
    label: "Tukidata"
    files:
      - label: "Vieraat"
        name: "guests"
        file: "src/data/guests.json"
        format: "json"
        fields:
          - label: "Vieraat"
            name: "guests"
            widget: "list"
            summary: "{{fields.name}} ({{fields.slug}})"
            fields:
              - { label: "Slug", name: "slug", widget: "string", required: true, pattern: ['^[a-z0-9-]+$', "Käytä vain pieniä kirjaimia, numeroita ja viivoja."] }
              - { label: "Nimi", name: "name", widget: "string", required: true }
              - { label: "Rooli / titteli", name: "role", widget: "string", required: false }
              - { label: "Bio", name: "bio", widget: "text", required: false }
              - { label: "Kuva-URL", name: "image", widget: "string", required: false }
              - label: "Linkit"
                name: "links"
                widget: "list"
                required: false
                fields:
                  - { label: "Otsikko", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
