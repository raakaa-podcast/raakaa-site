# Local fallback admin — Decap CMS is the primary content interface for the live site (/admin).
# Keep field schemas in sync manually if episode-meta.json structure changes.
#
# FIELD INVENTORY AUDIT (/jaksot data layer):
# - src/data/episode-meta.json (array items): episodeSlug:string, episodeGuid:string, guests:string[], topics:string[], summary:string, youtubeUrl:string
# - src/data/guests.json (array items): slug:string, name:string, role:string, bio:string, image:string, links:[{label:string,url:string}]
# - src/content/transcripts/*.md frontmatter: title:string, episodeGuid?:string, episodeSlug?:string, publishDate?:string, excerpt?:string + markdown body
# - /jaksot/[slug] consumes RSS fields (title, slug, description, publishedAt, duration, audioUrl, imageUrl), plus:
#   - episode-meta: guests[], topics[], summary, youtubeUrl
#   - guests.json via guests[] indirection (guest names/links on page)
#   - transcripts content collection for transcript body

backend:
  name: git-gateway
  repo: raakaa-podcast/raakaa-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b430177e-dfca-4421-8163-022c2dfd2791/pkce
  auth_token_endpoint: /sites/b430177e-dfca-4421-8163-022c2dfd2791/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://www.raakaa.fi

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "episodes"
    label: "Episodes"
    files:
      - label: "Episode Metadata"
        name: "episode_meta"
        file: "src/data/episode-meta.json"
        format: "json"
        fields:
          - label: "Episodes"
            name: "episodes"
            widget: "list"
            summary: "{{fields.episodeSlug}}"
            fields:
              - label: "Slug"
                name: "episodeSlug"
                widget: "string"
                required: true
                pattern: ['^[a-z0-9-]+$', "Use lowercase letters, numbers, and hyphens."]
              - label: "Short description / summary"
                name: "summary"
                widget: "text"
                required: false
              - label: "YouTube URL"
                name: "youtubeUrl"
                widget: "string"
                required: false
                hint: "Accepts any YouTube URL format — youtu.be, watch?v=, or /embed/"
              - label: "Tags"
                name: "topics"
                widget: "list"
                required: false
                field:
                  label: "Tag"
                  name: "topic"
                  widget: "string"
              - label: "Episode GUID (optional)"
                name: "episodeGuid"
                widget: "string"
                required: false
              - label: "Guest slugs"
                name: "guests"
                widget: "list"
                required: false
                field:
                  label: "Guest slug"
                  name: "guestSlug"
                  widget: "string"

  - name: "supporting_data"
    label: "Supporting Data"
    files:
      - label: "Guests"
        name: "guests"
        file: "src/data/guests.json"
        format: "json"
        fields:
          - label: "Guests"
            name: "guests"
            widget: "list"
            summary: "{{fields.slug}}"
            fields:
              - { label: "Slug", name: "slug", widget: "string", required: true }
              - { label: "Name", name: "name", widget: "string", required: true }
              - { label: "Guest Title / Role", name: "role", widget: "string", required: false }
              - { label: "Guest Bio", name: "bio", widget: "text", required: false }
              - { label: "Guest Photo URL", name: "image", widget: "string", required: false }
              - label: "Links"
                name: "links"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
  - name: "transcripts"
    label: "Litteroinnit"
    folder: "src/content/transcripts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Episode GUID", name: "episodeGuid", widget: "string", required: false }
      - { label: "Episode slug", name: "episodeSlug", widget: "string", required: false }
      - label: "Publish date"
        name: "publishDate"
        widget: "datetime"
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Litterointi", name: "body", widget: "markdown" }
