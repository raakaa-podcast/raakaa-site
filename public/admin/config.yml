# Local fallback admin — Decap CMS is the primary content interface for the live site (/admin).
# Keep field schemas in sync manually if episode-meta.json structure changes.
#
# FIELD INVENTORY AUDIT (/jaksot data layer):
# - src/data/episode-meta.json (array items): episodeSlug:string, episodeGuid:string, guests:string[], topics:string[], summary:string, youtubeUrl:string
# - src/data/guests.json (array items): slug:string, name:string, role:string, bio:string, image:string, links:[{label:string,url:string}]
# - src/data/litteroinnit.json (array items): title:string, episodeSlug:string, publishDate:string, excerpt:string, pdfUrl:string
# - src/content/transcripts/*.md frontmatter: title:string, episodeGuid?:string, episodeSlug?:string, publishDate?:string, excerpt?:string + markdown body
# - /jaksot/[slug] consumes RSS fields (title, slug, description, publishedAt, duration, audioUrl, imageUrl), plus:
#   - episode-meta: guests[], topics[], summary, youtubeUrl
#   - guests.json via guests[] indirection (guest names/links on page)
#   - litteroinnit/pdfTranscripts for PDF URL
#   - transcripts content collection for transcript body

backend:
  name: git-gateway
  repo: raakaa-podcast/raakaa-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b430177e-dfca-4421-8163-022c2dfd2791/pkce
  auth_token_endpoint: /sites/b430177e-dfca-4421-8163-022c2dfd2791/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://www.raakaa.fi

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "episodes"
    label: "Episodes"
    files:
      - label: "Episode Metadata"
        name: "episode_meta"
        file: "src/data/episode-meta.json"
        format: "json"
        fields:
          - label: "Episodes"
            name: "episodes"
            widget: "list"
            summary: "{{fields.slug}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                required: false
              - label: "Slug"
                name: "slug"
                widget: "string"
                pattern: ['^[a-z0-9-]+$', "Use lowercase letters, numbers, and hyphens."]
              - label: "Publish date"
                name: "publishDate"
                widget: "datetime"
                required: false
                date_format: "YYYY-MM-DD"
                time_format: false
              - label: "Episode number"
                name: "episodeNumber"
                widget: "number"
                required: false
                value_type: "int"
                min: 1
              - label: "Short description / summary"
                name: "description"
                widget: "text"
                required: false
              - label: "Guest name"
                name: "guestName"
                widget: "string"
                required: false
              - label: "Guest Title / Role"
                name: "guestRole"
                widget: "string"
                required: false
              - label: "Guest bio"
                name: "guestBio"
                widget: "text"
                required: false
              - label: "Guest Photo URL"
                name: "guestPhotoUrl"
                widget: "string"
                required: false
              - label: "YouTube URL"
                name: "youtubeUrl"
                widget: "string"
                required: false
                hint: "Accepts any YouTube URL format — youtu.be, watch?v=, or /embed/"
              - label: "Podcast Audio URL"
                name: "podcastAudioUrl"
                widget: "string"
                required: false
                hint: "Spotify, RSS, or direct audio link"
              - label: "Transcript"
                name: "transcript"
                widget: "text"
                required: false
                hint: "Full episode transcript. Leave blank if stored as a separate file."
              - label: "Transcript File Path"
                name: "transcriptFile"
                widget: "string"
                required: false
                hint: "Path to transcript file if not stored inline, e.g. src/data/transcripts/slug.txt"
              - label: "Tags"
                name: "tags"
                widget: "list"
                required: false
                field:
                  label: "Tag"
                  name: "tag"
                  widget: "string"
              - label: "OG Image URL"
                name: "ogImageUrl"
                widget: "string"
                required: false
              - label: "episodeSlug (live field)"
                name: "episodeSlug"
                widget: "string"
                required: false
                hint: "Existing live field consumed by /jaksot pages."
              - label: "episodeGuid (live field)"
                name: "episodeGuid"
                widget: "string"
                required: false
              - label: "guests (live field)"
                name: "guests"
                widget: "list"
                required: false
                field:
                  label: "Guest slug"
                  name: "guestSlug"
                  widget: "string"
              - label: "topics (live field)"
                name: "topics"
                widget: "list"
                required: false
                field:
                  label: "Topic"
                  name: "topic"
                  widget: "string"
              - label: "summary (live field)"
                name: "summary"
                widget: "text"
                required: false
