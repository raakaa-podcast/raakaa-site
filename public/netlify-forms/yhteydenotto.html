<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Netlify Forms – yhteydenotto</title>
  </head>
  <body>
    <!--
      Netlify-lomakkeen rekisteröinti staattisesti.
      Kenttien name-arvojen on vastattava etusivun lomaketta (ks. docs.netlify.com/forms/setup).
    -->
    <form name="yhteydenotto" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/kiitos">
      <input type="hidden" name="form-name" value="yhteydenotto" />
      <p hidden><label>Älä täytä tätä kenttää: <input name="bot-field" /></label></p>
      <p><label>Nimi <input type="text" name="nimi" /></label></p>
      <p><label>Sähköposti <input type="email" name="sahkoposti" /></label></p>
      <p>
        <label>Aihe
          <select name="aihe">
            <option value="vierasvinkki">Vierasehdotus</option>
            <option value="aihe-ehdotus">Aihe-ehdotus</option>
            <option value="palaute">Palaute</option>
            <option value="muu">Muu</option>
          </select>
        </label>
      </p>
      <p><label>Viesti <textarea name="viesti" rows="3"></textarea></label></p>
      <p><button type="submit">Lähetä</button></p>
    </form>
  </body>
</html>
